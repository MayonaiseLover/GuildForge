name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Security audit (fails on high/critical)
        run: pnpm audit --audit-level=high
      - run: npx prisma generate
      - name: Build shared packages
        run: pnpm turbo run build --filter='./packages/*'
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      SESSION_SECRET: ci-test-session-secret-32-chars-min
      DISCORD_CLIENT_ID: "000000000000000000"
      DISCORD_CLIENT_SECRET: ci-test-discord-secret
      DISCORD_BOT_TOKEN: ci-test-bot-token
      API_URL: http://localhost:4000
      WEB_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
      - name: Build shared packages
        run: pnpm turbo run build --filter='./packages/*'

      # Unit + integration tests
      - name: Run tests
        run: pnpm test

      - name: Run API coverage
        run: cd apps/api && pnpm vitest run --coverage

      # E2E tests: Skipped in CI (requires running app server + database)
      # Run locally: cd apps/web && npx playwright test

      # Upload coverage artifacts
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/api/coverage/
          retention-days: 14

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
      - run: pnpm build
